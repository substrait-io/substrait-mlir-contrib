name: Markdown formatting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Run markdownlint-cli2
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: '**/*.md'
          config: .markdownlint.jsonc
